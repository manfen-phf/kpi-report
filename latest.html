<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品运营分析报告 - <!-- PLACEHOLDER: generate_time --><!-- ENDPLACEHOLDER --></title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Microsoft YaHei',Arial,sans-serif; background:linear-gradient(135deg,#667eea,#764ba2); padding:20px; min-height:100vh; }
        .container { max-width:1600px; margin:0 auto; background:white; border-radius:15px; box-shadow:0 20px 60px rgba(0,0,0,.3); overflow:hidden; }
        
        /* ========== 顶部标题 ========== */
        .header { background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:30px; text-align:center; }
        .header h1 { font-size:32px; margin-bottom:10px; }
        .header .subtitle { font-size:16px; opacity:.9; }
        
        /* ========== 主Tab导航 ========== */
        .main-tabs { display:flex; background:linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.08)); border-bottom:2px solid rgba(102,126,234,0.2); gap:8px; padding:8px 20px 0; }
        .main-tab-btn { flex:1; padding:16px 24px; border:none; background:rgba(255,255,255,0.6); font-size:16px; cursor:pointer; transition:all .3s ease; border-radius:12px 12px 0 0; color:#555; font-weight:500; margin-bottom:-2px; }
        .main-tab-btn:hover { background:rgba(255,255,255,0.9); color:#667eea; transform:translateY(-2px); }
        .main-tab-btn.active { background:linear-gradient(135deg,#667eea,#764ba2); color:white; font-weight:bold; box-shadow:0 4px 15px rgba(102,126,234,0.4); }
        
        /* ========== 内容区域 ========== */
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        /* ========== 子Tab内容 ========== */
        .sub-tab-content { display:none; }
        .sub-tab-content.active { display:block; }
        
        /* ========== 子Tab导航 ========== */
        .sub-tabs { display:flex; background:linear-gradient(135deg, rgba(255,152,0,0.06), rgba(255,183,77,0.06)); border-bottom:2px solid rgba(255,152,0,0.2); padding:10px 30px 0; gap:12px; }
        .sub-tab-btn { padding:14px 28px; border:none; background:rgba(255,255,255,0.7); font-size:15px; cursor:pointer; transition:all .3s ease; border-radius:10px 10px 0 0; color:#666; font-weight:500; margin-bottom:-2px; }
        .sub-tab-btn:hover { background:rgba(255,255,255,0.95); color:#FF9800; transform:translateY(-2px); box-shadow:0 2px 8px rgba(255,152,0,0.15); }
        .sub-tab-btn.active { background:linear-gradient(135deg,#FF9800,#FFB74D); color:white; font-weight:bold; box-shadow:0 4px 12px rgba(255,152,0,0.35); }
        
        /* ========== 时间进度 ========== */
        .time-progress { background:#f8f9fa; padding:20px 30px; border-bottom:2px solid #ddd; }
        .progress-bar-container { margin-top:10px; }
        .progress-label { display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px; color:#666; }
        .progress-bar { width:100%; height:30px; background:#e0e0e0; border-radius:15px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,#667eea,#764ba2); display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:14px; }
        
        /* ========== KPI区域 ========== */
        .kpi-section { padding:30px; border-bottom:3px solid #ddd; }
        .section-title { font-size:24px; margin-bottom:20px; padding-bottom:10px; border-bottom:2px solid #667eea; }
        
        /* ========== KPI卡片（结果指标） ========== */
        .kpi-card-pinfan { background:linear-gradient(135deg,#FF9800,#FFB74D); padding:28px; border-radius:16px; color:white; box-shadow:0 8px 25px rgba(255,152,0,0.35); transition:all .3s ease; }
        .kpi-card-pinfan:hover { transform:translateY(-3px); box-shadow:0 12px 35px rgba(255,152,0,0.45); }
        .kpi-card-shenqiang { background:linear-gradient(135deg,#9C27B0,#CE93D8); padding:28px; border-radius:16px; color:white; box-shadow:0 8px 25px rgba(156,39,176,0.35); transition:all .3s ease; }
        .kpi-card-shenqiang:hover { transform:translateY(-3px); box-shadow:0 12px 35px rgba(156,39,176,0.45); }
        .kpi-card h3 { font-size:18px; margin-bottom:15px; opacity:.9; }
        .kpi-value { font-size:48px; font-weight:bold; margin:10px 0; }
        .kpi-comparison { display:flex; gap:20px; margin-top:15px; padding-top:15px; border-top:1px solid rgba(255,255,255,.3); }
        .comparison-item { flex:1; }
        .comparison-label { font-size:14px; opacity:.8; margin-bottom:5px; }
        .comparison-value { font-size:20px; font-weight:bold; }
        .gap-positive { color:#4CAF50; font-weight:bold; }
        .gap-negative { color:#f44336; font-weight:bold; }
        
        /* ========== 排名表格 ========== */
        .ranking-table { width:100%; border-collapse:collapse; margin-top:20px; }
        .ranking-table th { background:#667eea; color:white; padding:18px 15px; text-align:center; font-size:16px; }
        .ranking-table td { padding:15px; border-bottom:1px solid #e0e0e0; text-align:center; }
        .ranking-table tr:nth-child(even) { background:#f9f9f9; }
        .ranking-table tr:hover { background:#e8f0fe; }
        .rank-ouyang { background:#d4edda !important; font-weight:bold; }
        .rank-guangxi { background:#fff3cd !important; font-weight:bold; }
        .risk-normal { color:#4CAF50; font-weight:bold; }
        .risk-low { color:#ff9800; font-weight:bold; }
        .risk-high { color:#f44336; font-weight:bold; }
        
        /* ========== 数据来源 ========== */
        .data-source { margin-top:30px; padding:15px; background:#f8f9fa; border-radius:8px; font-size:14px; color:#666; }
        .city-special-note { background:#fff3cd; padding:10px; border-radius:5px; margin-bottom:15px; font-size:14px; color:#856404; }
        .assessment-badge { display:inline-block; padding:2px 8px; border-radius:3px; font-size:12px; font-weight:bold; margin-left:5px; }
        .assessment-p { background:#d4edda; color:#155724; }
        .assessment-ps { background:#cce5ff; color:#004085; }
        
        /* ========== 过程指标KPI网格 ========== */
        .process-kpi-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:20px; padding:25px; }
        .process-kpi-card { background:linear-gradient(145deg, #ffffff, #f8f9fa); border-radius:16px; padding:24px 20px; box-shadow:0 4px 15px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05); text-align:center; border:1px solid rgba(102,126,234,0.1); transition:all .3s ease; }
        .process-kpi-card:hover { transform:translateY(-4px); box-shadow:0 8px 25px rgba(102,126,234,0.15); }
        .process-kpi-card h3 { font-size:14px; color:#667eea; margin-bottom:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
        .process-kpi-value { font-size:32px; font-weight:bold; margin:15px 0; background:linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .process-kpi-compare { font-size:13px; color:#666; margin-top:12px; padding-top:12px; border-top:1px solid rgba(102,126,234,0.1); }
        
        /* ========== 过程指标排名表格 ========== */
        .process-ranking-table { width:100%; border-collapse:collapse; margin-top:20px; }
        .process-ranking-table th { background:#FF9800; color:white; padding:12px; text-align:center; font-size:14px; }
        .process-ranking-table td { padding:10px 12px; border-bottom:1px solid #ddd; text-align:center; }
        .process-ranking-table tr:hover { background:#f5f5f5; }
        
        /* ========== 数据分析框 ========== */
        .analysis-box { background:linear-gradient(135deg, rgba(102,126,234,0.05), rgba(118,75,162,0.05)); padding:24px 28px; margin:20px 30px; border-left:4px solid #667eea; border-radius:0 12px 12px 0; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
        .analysis-box h3 { color:#667eea; margin-bottom:10px; font-size:17px; }
        .analysis-box p { margin:8px 0; line-height:1.8; color:#555; }
        .analysis-box ul { margin:8px 0 8px 20px; }
        .analysis-box li { margin:5px 0; line-height:1.8; color:#555; }
        
        /* ========== Tab 3 样式（参考Tab 1紫色风格） ========== */
        .summary-cards { display:grid; grid-template-columns:repeat(3, 1fr); gap:18px; margin-bottom:20px; }
        .summary-card { border-radius:14px; padding:20px 18px; color:white; box-shadow:0 6px 20px rgba(0,0,0,.12); transition:all .3s ease; text-align:center; }
        .summary-card:hover { transform:translateY(-3px); box-shadow:0 10px 30px rgba(0,0,0,.2); }
        .card-warn { background:linear-gradient(135deg, #e57373, #ef5350); box-shadow:0 6px 20px rgba(239,83,80,.3); }
        .card-warn:hover { box-shadow:0 10px 30px rgba(239,83,80,.4); }
        .card-fine { background:linear-gradient(135deg, #ffb74d, #ffa726); box-shadow:0 6px 20px rgba(255,167,38,.3); }
        .card-fine:hover { box-shadow:0 10px 30px rgba(255,167,38,.4); }
        .card-good { background:linear-gradient(135deg, #81c784, #66bb6a); box-shadow:0 6px 20px rgba(102,187,106,.3); }
        .card-good:hover { box-shadow:0 10px 30px rgba(102,187,106,.4); }
        .card-icon { font-size:28px; margin-bottom:10px; }
        .card-label { font-size:14px; opacity:.95; margin-bottom:10px; font-weight:500; }
        .card-value { font-size:44px; font-weight:bold; }
        .card-sub { font-size:13px; opacity:.9; margin-top:10px; }
        
        /* KPI表格 - 优化样式 */
        .table-wrapper { margin-top:20px; overflow-x:auto; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,.08); background:white; }
        .kpi-table { width:100%; border-collapse:separate; border-spacing:0; font-size:14px; min-width:1400px; }
        .kpi-table thead { position:sticky; top:0; z-index:20; }
        .kpi-table th { padding:14px 10px; text-align:center; font-size:13px; font-weight:600; color:#fff; border-right:1px solid rgba(255,255,255,.25); letter-spacing:.3px; }
        .kpi-table th:last-child { border-right:none; }
        .kpi-table td { padding:12px 10px; text-align:center; border-bottom:1px solid #f0f0f0; border-right:1px solid #f0f0f0; font-size:13px; color:#444; line-height:1.5; }
        .kpi-table td:last-child { border-right:none; }
        /* 行分隔线：表头底部加粗，与数据行区分 */
        .kpi-table thead tr:last-child th { border-bottom:2.5px solid rgba(0,0,0,.2); }
        .kpi-table tbody tr { transition:background .2s; }
        .kpi-table tbody tr:hover { background:#f0f4ff; }
        .kpi-table tbody tr:nth-child(even) { background:#fafbff; }
        .kpi-table tbody tr:nth-child(even):hover { background:#f0f4ff; }
        /* 表头分组行 */
        .kpi-table thead tr:first-child th { padding:10px; font-size:14px; font-weight:600; border-bottom:2px solid rgba(255,255,255,0.4); }
        /* 表头颜色 - 加深同色系，分组头和子头保持一致 */
        .th-group-1, .th-sub-1 { background:#5c6bc0; color:#fff; }
        .th-group-2, .th-sub-2 { background:#7e57c2; color:#fff; }
        .th-group-3, .th-sub-3 { background:#42a5f5; color:#fff; }
        .th-group-4, .th-sub-4 { background:#ff7043; color:#fff; }
        .th-group-5, .th-sub-5 { background:#66bb6a; color:#fff; }
        /* 预估列 - 数据行统一样式（浅绿底+加粗，不影响表头） */
        td.col-est-phf, td.col-est-sq, td.col-est-total { background:#e8f5e9; font-style:italic; font-weight:700; color:#2e7d32; }
        
        /* Tab 3 分析框 - 参考Tab 1风格 */
        .kpi-analysis { background:linear-gradient(135deg, rgba(102,126,234,0.05), rgba(118,75,162,0.05)); padding:24px 28px; margin:20px 0; border-left:4px solid #667eea; border-radius:0 12px 12px 0; box-shadow:0 2px 8px rgba(0,0,0,.04); }
        .kpi-analysis h3 { color:#667eea; margin-bottom:12px; font-size:17px; }
        .kpi-analysis p { margin:8px 0; line-height:1.8; color:#555; }
        .kpi-analysis ul { margin:8px 0 8px 20px; }
        .kpi-analysis li { margin:6px 0; line-height:1.8; color:#555; }
        .kpi-analysis strong { color:#333; }
        
        /* 风险项样式（Tab 3） */
        .risk-item { display:flex; align-items:flex-start; gap:12px; margin:12px 0; padding:12px 15px; border-radius:8px; background:#fafafa; border-left:3px solid transparent; }
        .risk-item-warn { background:#ffebee; border-left-color:#f44336; }
        .risk-item-fine { background:#fff8e1; border-left-color:#ff9800; }
        .risk-tag { display:inline-block; padding:4px 12px; border-radius:4px; font-size:13px; font-weight:600; white-space:nowrap; }
        .risk-tag-warn { background:#ffebee; color:#f44336; border:1px solid #f44336; }
        .risk-tag-fine { background:#fff3e0; color:#ff9800; border:1px solid #ff9800; }
        .risk-tag-both { background:#ffebee; color:#c62828; border:1px solid #f44336; }
        .risk-tag-normal { background:#e8f5e9; color:#2e7d32; }
        .risk-tag-normal { background:#e8f5e9; color:#4caf50; }
        .risk-text { flex:1; color:#555; line-height:1.6; font-size:14px; }
        
        /* ========== 响应式 ========== */
        @media (max-width:768px) {
            .process-kpi-grid { grid-template-columns:1fr; }
            .summary-cards { grid-template-columns:1fr; }
            .main-tab-btn { font-size:14px; padding:12px 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
<!-- 顶部标题 -->
<div class="header">

        <button class="sub-tab-btn" onclick="showSubTab('process-yulin', this, 'process')">🏪 玉林商进度</button>

<!-- JavaScript -->
<script>
    /* 主Tab切换 */
    function showMainTab(tabId, btn) {
        // 隐藏所有主Tab内容
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        // 显示目标Tab
        document.getElementById(tabId).classList.add('active');
        // 更新按钮状态
        document.querySelectorAll('.main-tab-btn').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
    }

    /* 子Tab切换 */
    function showSubTab(subTabId, btn, prefix) {
        // 隐藏当前主Tab下所有子Tab内容
        const parentTab = btn.closest('.tab-content');
        parentTab.querySelectorAll('.sub-tab-content').forEach(el => el.style.display = 'none');
        // 显示目标子Tab
        document.getElementById(prefix + '-' + subTabId).style.display = 'block';
        // 更新按钮状态
        parentTab.querySelectorAll('.sub-tab-btn').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
    }
</script>
